
[build]
base = "packages/frontend"
command = "npm run build"
publish = "dist"
functions = "../../netlify/functions"

[build.environment]
# Obligado Node 22: soporte de importaciones dinámicas y fs/promises top-level.
NODE_VERSION = "22"

# Notas:
# - En `netlify dev`, las funciones se sirven desde `netlify/functions`.
# - Las variables de entorno se cargan desde `.env` en la raíz del repo.
